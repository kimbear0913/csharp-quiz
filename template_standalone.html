<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>C# + Unity 퀴즈 · 중간고사 예상문제</title>
  <meta name="description" content="C#과 Unity 중간고사 예상문제 46선. 분야별 랜덤 출제로 풀어보세요." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=IBM+Plex+Sans+KR:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d1117;
      --bg-elev: #161b22;
      --bg-elev-2: #1c2128;
      --border: #30363d;
      --border-hi: #484f58;
      --text: #e6edf3;
      --text-dim: #8b949e;
      --text-faint: #6e7681;
      --accent: #58a6ff;
      --ok: #3fb950;
      --ng: #f85149;
      --warn: #d29922;
      --mono: 'JetBrains Mono', 'SF Mono', Consolas, monospace;
      --sans: 'IBM Plex Sans KR', -apple-system, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(88, 166, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(88, 166, 255, 0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }
    .container {
      max-width: 780px;
      margin: 0 auto;
      padding: 40px 24px 80px;
      position: relative;
      z-index: 1;
    }
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 32px;
    }
    .logo {
      font-family: var(--mono);
      font-weight: 700;
      color: var(--accent);
      font-size: 20px;
    }
    .logo .prompt { color: var(--ok); }
    .subtitle {
      color: var(--text-dim);
      font-size: 13px;
      font-family: var(--mono);
    }
    .panel {
      background: var(--bg-elev);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 28px;
      margin-bottom: 20px;
      animation: fadeIn 0.25s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .panel-title {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text-faint);
      text-transform: uppercase;
      letter-spacing: 1.2px;
      margin-bottom: 16px;
    }
    h1 { font-size: 24px; font-weight: 600; margin-bottom: 8px; }
    .label {
      display: block;
      font-family: var(--mono);
      font-size: 13px;
      color: var(--text-dim);
      margin-bottom: 8px;
      margin-top: 20px;
    }
    .category-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 10px;
    }
    .cat-btn {
      background: var(--bg-elev-2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 14px 16px;
      border-radius: 6px;
      cursor: pointer;
      text-align: left;
      font-family: var(--sans);
      font-size: 14px;
      transition: all 0.15s ease;
    }
    .cat-btn:hover { border-color: var(--accent); background: #1f2933; }
    .cat-btn.active {
      border-color: var(--accent);
      background: rgba(88, 166, 255, 0.1);
    }
    .cat-btn .count {
      display: block;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-faint);
      margin-top: 4px;
    }
    .count-input-row {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-top: 8px;
    }
    input[type="number"], input[type="text"] {
      background: var(--bg-elev-2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 14px;
      border-radius: 6px;
      font-family: var(--mono);
      font-size: 14px;
      width: 100%;
      outline: none;
      transition: border-color 0.15s;
    }
    input[type="number"]:focus, input[type="text"]:focus { border-color: var(--accent); }
    input[type="number"] { max-width: 140px; }
    .quick-counts { display: flex; gap: 6px; }
    .quick-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-dim);
      padding: 8px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-family: var(--mono);
      font-size: 12px;
    }
    .quick-btn:hover { border-color: var(--accent); color: var(--text); }
    .btn-primary {
      background: var(--accent);
      color: #0d1117;
      border: none;
      padding: 12px 28px;
      border-radius: 6px;
      font-family: var(--mono);
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      margin-top: 24px;
      transition: all 0.15s;
    }
    .btn-primary:hover { background: #79b8ff; transform: translateY(-1px); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-secondary {
      background: transparent;
      color: var(--text-dim);
      border: 1px solid var(--border);
      padding: 10px 20px;
      border-radius: 6px;
      font-family: var(--mono);
      font-size: 13px;
      cursor: pointer;
    }
    .btn-secondary:hover { color: var(--text); border-color: var(--border-hi); }
    /* 퀴즈 헤더 (뒤로가기 + 진행상태) */
    .quiz-header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 14px;
    }
    .back-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-dim);
      padding: 6px 12px;
      border-radius: 4px;
      font-family: var(--mono);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .back-btn:hover {
      border-color: var(--accent);
      color: var(--text);
    }
    .back-btn:active { transform: translateY(1px); }

    .progress-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text-dim);
      flex: 1;
    }

    /* 확인 모달 */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(3px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      animation: fadeIn 0.15s ease;
    }
    .modal {
      background: var(--bg-elev);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 24px;
      max-width: 400px;
      width: calc(100% - 40px);
      animation: fadeIn 0.2s ease;
    }
    .modal-title {
      font-family: var(--mono);
      font-size: 13px;
      color: var(--warn);
      text-transform: uppercase;
      letter-spacing: 1.2px;
      margin-bottom: 10px;
    }
    .modal-body {
      font-size: 15px;
      color: var(--text);
      margin-bottom: 20px;
      line-height: 1.6;
    }
    .modal-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }
    .modal-actions button {
      padding: 10px 18px;
      border-radius: 6px;
      font-family: var(--mono);
      font-size: 13px;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--bg-elev-2);
      color: var(--text);
    }
    .modal-actions .danger {
      background: var(--ng);
      color: #0d1117;
      border-color: var(--ng);
      font-weight: 700;
    }
    .modal-actions .danger:hover { background: #ff6b63; }
    .modal-actions .cancel:hover { border-color: var(--border-hi); }
    .progress-bar {
      width: 100%;
      height: 4px;
      background: var(--bg-elev-2);
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 24px;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--ok));
      transition: width 0.3s ease;
    }
    .q-meta {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      font-family: var(--mono);
      font-size: 11px;
    }
    .tag {
      padding: 3px 8px;
      border-radius: 3px;
      background: var(--bg-elev-2);
      color: var(--text-dim);
      border: 1px solid var(--border);
    }
    .tag.type-mc { color: var(--accent); border-color: rgba(88, 166, 255, 0.3); }
    .tag.type-short { color: var(--warn); border-color: rgba(210, 153, 34, 0.3); }
    .question-text {
      font-size: 17px;
      line-height: 1.7;
      margin-bottom: 24px;
      color: var(--text);
    }
    .choices { display: flex; flex-direction: column; gap: 8px; }
    .choice {
      background: var(--bg-elev-2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 14px 16px;
      cursor: pointer;
      font-family: var(--sans);
      font-size: 14px;
      color: var(--text);
      text-align: left;
      transition: all 0.12s;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .choice:hover:not(.locked) { border-color: var(--accent); background: #1f2933; }
    .choice.selected {
      border-color: var(--accent);
      background: rgba(88, 166, 255, 0.08);
    }
    .choice.correct {
      border-color: var(--ok);
      background: rgba(63, 185, 80, 0.1);
    }
    .choice.wrong {
      border-color: var(--ng);
      background: rgba(248, 81, 73, 0.1);
    }
    .choice.locked { cursor: default; }
    .choice-mark {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text-faint);
      min-width: 18px;
    }
    .multi-hint {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--warn);
      margin-bottom: 10px;
    }
    .feedback {
      margin-top: 20px;
      padding: 16px;
      border-radius: 6px;
      border-left: 3px solid;
      animation: slideIn 0.2s ease;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-4px); }
      to { opacity: 1; transform: translateX(0); }
    }
    .feedback.ok { background: rgba(63, 185, 80, 0.08); border-color: var(--ok); }
    .feedback.ng { background: rgba(248, 81, 73, 0.08); border-color: var(--ng); }
    .feedback-status {
      font-family: var(--mono);
      font-weight: 700;
      font-size: 13px;
      margin-bottom: 6px;
    }
    .feedback.ok .feedback-status { color: var(--ok); }
    .feedback.ng .feedback-status { color: var(--ng); }
    .feedback-answer {
      font-family: var(--mono);
      font-size: 13px;
      color: var(--text-dim);
      margin-bottom: 8px;
    }
    .feedback-answer b { color: var(--text); }
    .feedback-explain {
      font-size: 14px;
      color: var(--text);
      line-height: 1.7;
    }
    .action-row {
      display: flex;
      gap: 10px;
      margin-top: 20px;
      justify-content: flex-end;
    }
    .score-display { text-align: center; padding: 24px 0; }
    .score-big {
      font-family: var(--mono);
      font-size: 56px;
      font-weight: 700;
      color: var(--accent);
      line-height: 1;
    }
    .score-total {
      font-family: var(--mono);
      font-size: 20px;
      color: var(--text-faint);
      margin-left: 8px;
    }
    .score-pct {
      font-family: var(--mono);
      color: var(--text-dim);
      margin-top: 8px;
      font-size: 14px;
    }
    .grade {
      margin-top: 12px;
      font-size: 16px;
      color: var(--text);
    }
    .wrong-item {
      background: var(--bg-elev-2);
      border: 1px solid var(--border);
      border-left: 3px solid var(--ng);
      padding: 14px 16px;
      margin-bottom: 10px;
      border-radius: 4px;
    }
    .wrong-q { font-size: 14px; margin-bottom: 8px; }
    .wrong-detail {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text-dim);
      line-height: 1.7;
    }
    .wrong-detail b { color: var(--text); }
    .blink {
      display: inline-block;
      width: 8px;
      height: 14px;
      background: var(--ok);
      animation: blink 1s step-end infinite;
      margin-left: 2px;
      vertical-align: middle;
    }
    @keyframes blink { 50% { opacity: 0; } }
    .hidden { display: none !important; }

    /* 푸터 */
    .footer {
      text-align: center;
      margin-top: 40px;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-faint);
    }
    .footer a { color: var(--accent); text-decoration: none; }
    .footer a:hover { text-decoration: underline; }

    @media (max-width: 600px) {
      .container { padding: 20px 16px 60px; }
      .panel { padding: 20px; }
      h1 { font-size: 20px; }
      .question-text { font-size: 15px; }
      .score-big { font-size: 44px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div>
        <div class="logo"><span class="prompt">$</span> quiz.exe<span class="blink"></span></div>
        <div class="subtitle">C# + Unity 중간고사 예상문제</div>
      </div>
    </header>

    <div id="setup" class="panel">
      <div class="panel-title">// SETUP</div>
      <h1>퀴즈 시작</h1>
      <p style="color: var(--text-dim); font-size: 14px;">분야와 문제 수를 선택하세요.</p>

      <div class="label">분야 선택</div>
      <div id="categoryGrid" class="category-grid"></div>

      <div class="label">문제 수</div>
      <div class="count-input-row">
        <input type="number" id="countInput" min="1" value="10" />
        <div class="quick-counts">
          <button class="quick-btn" data-n="5">5</button>
          <button class="quick-btn" data-n="10">10</button>
          <button class="quick-btn" data-n="20">20</button>
          <button class="quick-btn" data-n="max">MAX</button>
        </div>
      </div>

      <button id="startBtn" class="btn-primary">▶ 시작하기</button>
    </div>

    <div id="quiz" class="panel hidden">
      <div class="quiz-header">
        <button id="backBtn" class="back-btn" title="설정 화면으로 돌아가기">← 돌아가기</button>
        <div class="progress-row">
          <span id="progressText">문제 1 / 10</span>
          <span id="scoreText">점수: 0</span>
        </div>
      </div>
      <div class="progress-bar" style="margin-top: 4px;">
        <div class="progress-fill" id="progressFill" style="width: 0%"></div>
      </div>

      <div class="q-meta">
        <span class="tag" id="tagCategory">분야</span>
        <span class="tag" id="tagType">유형</span>
      </div>

      <div class="question-text" id="questionText"></div>

      <div id="multiHint" class="multi-hint hidden">※ 복수 정답: 여러 개 체크하세요</div>

      <div id="choices" class="choices"></div>
      <div id="shortInputWrap" class="hidden" style="margin-top: 12px;">
        <input type="text" id="shortInput" placeholder="답을 입력하세요..." autocomplete="off" />
      </div>

      <div id="feedback" class="feedback hidden"></div>

      <div class="action-row">
        <button id="submitBtn" class="btn-primary">제출</button>
        <button id="nextBtn" class="btn-primary hidden">다음 →</button>
      </div>
    </div>

    <div id="result" class="panel hidden">
      <div class="panel-title">// RESULT</div>
      <div class="score-display">
        <div>
          <span class="score-big" id="finalScore">0</span>
          <span class="score-total">/ <span id="finalTotal">0</span></span>
        </div>
        <div class="score-pct" id="finalPct">0.0%</div>
        <div class="grade" id="gradeText"></div>
      </div>

      <div id="wrongSection">
        <div class="panel-title" style="margin-top: 20px;">// 오답 노트</div>
        <div id="wrongList"></div>
      </div>

      <div class="action-row">
        <button id="restartBtn" class="btn-primary">다시 풀기</button>
      </div>
    </div>

    <div class="footer">
      <span>// 문제 데이터는 브라우저 내에서만 처리됨. 서버 없음.</span>
    </div>
  </div>

  <!-- 확인 모달 -->
  <div id="confirmModal" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-title">// 퀴즈 중단</div>
      <div class="modal-body">
        진행 중인 퀴즈를 중단하고 처음으로 돌아갈까요?<br>
        <span style="color: var(--text-dim); font-size: 13px;">현재까지의 점수는 저장되지 않습니다.</span>
      </div>
      <div class="modal-actions">
        <button id="modalCancel" class="cancel">계속 풀기</button>
        <button id="modalConfirm" class="danger">중단하고 나가기</button>
      </div>
    </div>
  </div>

<script id="quiz-data" type="application/json">

</script>

<script>
// === 데이터 로드 ===
const DATA = JSON.parse(document.getElementById("quiz-data").textContent);
const QUESTIONS = DATA.questions;
const CATEGORIES = DATA.categories;  // {key: displayName}

// === 유틸: 정답 판정 (Flask 로직을 JS로 이식) ===
function normalize(text) {
  return String(text).replace(/\s+/g, "").toLowerCase();
}

function checkAnswer(q, userInput) {
  if (!userInput || !userInput.trim()) return false;
  if (q.type === "mc") {
    if (q.multi) {
      const u = new Set(userInput.split(",").map(s => s.trim().toLowerCase()).filter(Boolean));
      const a = new Set(q.answer.split(",").map(s => s.trim().toLowerCase()));
      if (u.size !== a.size) return false;
      for (const x of u) if (!a.has(x)) return false;
      return true;
    }
    return userInput.trim().toLowerCase() === q.answer.trim().toLowerCase();
  } else {
    // short
    const u = normalize(userInput);
    return q.accept.some(a => normalize(a) === u);
  }
}

// === 상태 ===
let selectedCategory = "all";
let sessionQuestions = [];
let currentIdx = 0;
let score = 0;
let answers = []; // [{qid, user, correct}]
let selectedChoices = new Set();
let awaitingNext = false;

// === 초기화 ===
function init() {
  renderCategories();
  bindEvents();
  updateMaxCount();
}

function getCategoryList() {
  // '전체' + 각 카테고리
  const list = [{key: "all", name: "전체", count: QUESTIONS.length}];
  for (const [key, name] of Object.entries(CATEGORIES)) {
    const count = QUESTIONS.filter(q => q.category === key).length;
    list.push({key, name, count});
  }
  return list;
}

function renderCategories() {
  const grid = document.getElementById("categoryGrid");
  grid.innerHTML = "";
  getCategoryList().forEach((c, i) => {
    const btn = document.createElement("button");
    btn.className = "cat-btn" + (i === 0 ? " active" : "");
    btn.dataset.key = c.key;
    btn.innerHTML = `${c.name}<span class="count">${c.count} 문제</span>`;
    btn.onclick = () => {
      document.querySelectorAll(".cat-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      selectedCategory = c.key;
      updateMaxCount();
    };
    grid.appendChild(btn);
  });
}

function getPool() {
  return selectedCategory === "all"
    ? QUESTIONS
    : QUESTIONS.filter(q => q.category === selectedCategory);
}

function updateMaxCount() {
  const pool = getPool();
  const input = document.getElementById("countInput");
  input.max = pool.length;
  if (parseInt(input.value) > pool.length) input.value = pool.length;
}

function bindEvents() {
  document.getElementById("startBtn").onclick = startQuiz;
  document.getElementById("submitBtn").onclick = submitAnswer;
  document.getElementById("nextBtn").onclick = nextQuestion;
  document.getElementById("restartBtn").onclick = () => {
    goToSetup(false);  // 결과 화면에서는 히스토리 조작 불필요
  };

  // 뒤로가기 버튼 (퀴즈 상단)
  document.getElementById("backBtn").onclick = () => {
    showConfirmModal();
  };

  // 모달 버튼
  document.getElementById("modalCancel").onclick = hideConfirmModal;
  document.getElementById("modalConfirm").onclick = () => {
    hideConfirmModal();
    goToSetup(true);
  };
  // 모달 바깥 클릭 → 취소
  document.getElementById("confirmModal").onclick = (e) => {
    if (e.target.id === "confirmModal") hideConfirmModal();
  };

  // 브라우저 뒤로가기(← 버튼 / 모바일 스와이프) 대응
  window.addEventListener("popstate", (e) => {
    // 퀴즈 진행 중이었으면 setup으로 복귀
    if (!document.getElementById("quiz").classList.contains("hidden")) {
      goToSetup(false);  // 이미 popstate로 히스토리가 물러났으니 pushState 불필요
    } else if (!document.getElementById("result").classList.contains("hidden")) {
      goToSetup(false);
    }
  });

  document.querySelectorAll(".quick-btn").forEach(btn => {
    btn.onclick = () => {
      const pool = getPool();
      const n = btn.dataset.n === "max" ? pool.length : parseInt(btn.dataset.n);
      document.getElementById("countInput").value = Math.min(n, pool.length);
    };
  });

  document.addEventListener("keydown", (e) => {
    // 모달 열려있으면 ESC로 닫기
    if (!document.getElementById("confirmModal").classList.contains("hidden")) {
      if (e.key === "Escape") hideConfirmModal();
      return;
    }
    if (e.key === "Enter" && !document.getElementById("quiz").classList.contains("hidden")) {
      e.preventDefault();
      if (awaitingNext) nextQuestion();
      else submitAnswer();
    }
    // 퀴즈 중 ESC로 뒤로가기
    if (e.key === "Escape" && !document.getElementById("quiz").classList.contains("hidden")) {
      showConfirmModal();
    }
  });
}

// === 모달 ===
function showConfirmModal() {
  document.getElementById("confirmModal").classList.remove("hidden");
}
function hideConfirmModal() {
  document.getElementById("confirmModal").classList.add("hidden");
}

// === 화면 전환 ===
function goToSetup(replaceHistory) {
  document.getElementById("quiz").classList.add("hidden");
  document.getElementById("result").classList.add("hidden");
  document.getElementById("setup").classList.remove("hidden");
  // 상태 초기화
  sessionQuestions = [];
  currentIdx = 0;
  score = 0;
  answers = [];

  // 히스토리 정리: quiz 상태가 남아있지 않도록
  if (replaceHistory && history.state && history.state.screen === "quiz") {
    history.replaceState({screen: "setup"}, "", location.href);
  }
}

// === 퀴즈 시작 ===
function shuffle(arr) {
  // Fisher-Yates
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startQuiz() {
  const pool = getPool();
  const count = Math.max(1, Math.min(parseInt(document.getElementById("countInput").value) || 10, pool.length));
  sessionQuestions = shuffle(pool).slice(0, count);
  currentIdx = 0;
  score = 0;
  answers = [];

  document.getElementById("setup").classList.add("hidden");
  document.getElementById("result").classList.add("hidden");
  document.getElementById("quiz").classList.remove("hidden");

  // 브라우저 뒤로가기 대응용 히스토리 엔트리 추가
  // setup → quiz 진입 시 push, 뒤로가기 시 popstate로 돌아옴
  history.pushState({screen: "quiz"}, "", location.href);

  showQuestion();
}

function showQuestion() {
  const q = sessionQuestions[currentIdx];
  selectedChoices.clear();
  awaitingNext = false;

  document.getElementById("progressText").textContent = `문제 ${currentIdx + 1} / ${sessionQuestions.length}`;
  document.getElementById("scoreText").textContent = `점수: ${score}`;
  const pct = (currentIdx / sessionQuestions.length) * 100;
  document.getElementById("progressFill").style.width = pct + "%";

  document.getElementById("tagCategory").textContent = CATEGORIES[q.category] || q.category;
  const typeTag = document.getElementById("tagType");
  typeTag.textContent = q.type === "mc" ? "객관식" : "단답형";
  typeTag.className = "tag " + (q.type === "mc" ? "type-mc" : "type-short");

  document.getElementById("questionText").textContent = q.question;

  const choicesDiv = document.getElementById("choices");
  const shortWrap = document.getElementById("shortInputWrap");
  const multiHint = document.getElementById("multiHint");

  if (q.type === "mc") {
    shortWrap.classList.add("hidden");
    choicesDiv.classList.remove("hidden");
    multiHint.classList.toggle("hidden", !q.multi);
    renderChoices(q);
  } else {
    choicesDiv.classList.add("hidden");
    multiHint.classList.add("hidden");
    shortWrap.classList.remove("hidden");
    const inp = document.getElementById("shortInput");
    inp.value = "";
    inp.disabled = false;
    setTimeout(() => inp.focus(), 50);
  }

  document.getElementById("feedback").classList.add("hidden");
  document.getElementById("submitBtn").classList.remove("hidden");
  document.getElementById("submitBtn").disabled = false;
  document.getElementById("nextBtn").classList.add("hidden");
}

function renderChoices(q) {
  const div = document.getElementById("choices");
  div.innerHTML = "";
  q.choices.forEach((text) => {
    const match = text.match(/^([①-⑩A-Z])[\.\s]*(.+)$/);
    const mark = match ? match[1] : "";
    const body = match ? match[2] : text;
    const markNormalized = normalizeMark(mark);

    const btn = document.createElement("button");
    btn.className = "choice";
    btn.innerHTML = `<span class="choice-mark">${escapeHtml(mark)}</span><span>${escapeHtml(body)}</span>`;
    btn.dataset.mark = markNormalized;
    btn.onclick = () => {
      if (btn.classList.contains("locked")) return;
      if (q.multi) {
        if (selectedChoices.has(markNormalized)) {
          selectedChoices.delete(markNormalized);
          btn.classList.remove("selected");
        } else {
          selectedChoices.add(markNormalized);
          btn.classList.add("selected");
        }
      } else {
        selectedChoices.clear();
        document.querySelectorAll(".choice").forEach(b => b.classList.remove("selected"));
        selectedChoices.add(markNormalized);
        btn.classList.add("selected");
      }
    };
    div.appendChild(btn);
  });
}

function normalizeMark(mark) {
  const map = {"①":"1","②":"2","③":"3","④":"4","⑤":"5","⑥":"6","⑦":"7","⑧":"8","⑨":"9","⑩":"10"};
  return map[mark] || mark;
}

// === 답변 제출 ===
function submitAnswer() {
  const q = sessionQuestions[currentIdx];
  let userAnswer = "";
  if (q.type === "mc") {
    if (selectedChoices.size === 0) {
      alert("답을 선택하세요.");
      return;
    }
    userAnswer = [...selectedChoices].join(",");
  } else {
    userAnswer = document.getElementById("shortInput").value.trim();
    if (!userAnswer) {
      alert("답을 입력하세요.");
      return;
    }
  }

  const correct = checkAnswer(q, userAnswer);
  if (correct) score++;
  answers.push({qid: q.id, user: userAnswer, correct});

  // 피드백 표시
  const correctAnswer = q.type === "mc" ? q.answer : q.accept[0];
  showFeedback({correct, answer: correctAnswer, explain: q.explain});
  document.getElementById("scoreText").textContent = `점수: ${score}`;

  // 선택지 잠그기
  document.querySelectorAll(".choice").forEach(b => b.classList.add("locked"));
  if (q.type === "mc") {
    const correctMarks = q.answer.split(",").map(s => s.trim());
    document.querySelectorAll(".choice").forEach(b => {
      if (correctMarks.includes(b.dataset.mark)) b.classList.add("correct");
      else if (b.classList.contains("selected")) b.classList.add("wrong");
    });
  } else {
    document.getElementById("shortInput").disabled = true;
  }

  document.getElementById("submitBtn").classList.add("hidden");

  const isFinal = currentIdx + 1 >= sessionQuestions.length;
  const nextBtn = document.getElementById("nextBtn");
  nextBtn.textContent = isFinal ? "결과 보기 →" : "다음 →";
  nextBtn.classList.remove("hidden");
  awaitingNext = true;
}

function showFeedback({correct, answer, explain}) {
  const fb = document.getElementById("feedback");
  fb.className = "feedback " + (correct ? "ok" : "ng");
  fb.innerHTML = `
    <div class="feedback-status">${correct ? "✓ CORRECT" : "✗ WRONG"}</div>
    ${correct ? "" : `<div class="feedback-answer">정답: <b>${escapeHtml(answer)}</b></div>`}
    <div class="feedback-explain">${escapeHtml(explain)}</div>
  `;
  fb.classList.remove("hidden");
}

function nextQuestion() {
  currentIdx++;
  if (currentIdx >= sessionQuestions.length) {
    showResult();
  } else {
    showQuestion();
  }
}

// === 결과 ===
function showResult() {
  document.getElementById("quiz").classList.add("hidden");
  document.getElementById("result").classList.remove("hidden");

  const total = sessionQuestions.length;
  document.getElementById("finalScore").textContent = score;
  document.getElementById("finalTotal").textContent = total;
  const pct = (score / total) * 100;
  document.getElementById("finalPct").textContent = pct.toFixed(1) + "%";

  let grade = "";
  if (pct === 100) grade = "🏆 만점 · 완벽합니다";
  else if (pct >= 80) grade = "🥇 우수";
  else if (pct >= 60) grade = "🥈 보통 · 해설 복습 권장";
  else if (pct >= 40) grade = "🥉 미흡 · 복습 필요";
  else grade = "📖 기초부터 다시 볼 것을 권합니다";
  document.getElementById("gradeText").textContent = grade;

  const wrongAnswers = answers.filter(a => !a.correct);
  const wrongSection = document.getElementById("wrongSection");
  const wrongList = document.getElementById("wrongList");

  if (wrongAnswers.length === 0) {
    wrongSection.innerHTML = `
      <div class="panel-title" style="margin-top: 20px;">// 오답 노트</div>
      <p style="color: var(--text-dim); font-family: var(--mono); font-size: 13px;">틀린 문제가 없습니다. 👏</p>
    `;
  } else {
    wrongSection.innerHTML = `
      <div class="panel-title" style="margin-top: 20px;">// 오답 노트 (${wrongAnswers.length}개)</div>
      <div id="wrongList"></div>
    `;
    const newList = document.getElementById("wrongList");
    wrongAnswers.forEach(a => {
      const q = sessionQuestions.find(qq => qq.id === a.qid);
      const correctAns = q.type === "mc" ? q.answer : q.accept[0];
      const item = document.createElement("div");
      item.className = "wrong-item";
      item.innerHTML = `
        <div class="wrong-q">Q${q.id}. ${escapeHtml(q.question)}</div>
        <div class="wrong-detail">
          내 답: <b>${escapeHtml(a.user || "(무응답)")}</b><br>
          정답: <b style="color: var(--ok);">${escapeHtml(correctAns)}</b><br>
          해설: ${escapeHtml(q.explain)}
        </div>
      `;
      newList.appendChild(item);
    });
  }
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
  }[c]));
}

init();
</script>
